<!DOCTYPE html>
<html lang="en">
  
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">
      <span class="logo-mark">◈</span>
      <span>Trace</span>
    </div>
    <div class="header-actions">
      <select id="algoSelect">
        <option value="fib">Fibonacci</option>
        <option value="fibMemo">Fibonacci (Memo)</option>
      </select>
      <div class="param">
        <label>n =</label>
        <input type="number" id="paramInput" value="6" min="1" max="10">
      </div>
      <button id="runBtn">Run</button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="panel">
        <div class="panel-label">Algorithm</div>
        <pre id="codeBlock">def fib(n):
  if n <= 1:
    return n
  return fib(n-1) + fib(n-2)</pre>
      </div>

      <div class="panel">
        <div class="panel-label">Controls</div>
        <div class="controls">
          <button id="resetBtn" title="Reset">↺</button>
          <button id="stepBackBtn" title="Back">←</button>
          <button id="playBtn" class="play" title="Play">▶</button>
          <button id="stepForwardBtn" title="Forward">→</button>
        </div>
        <div class="speed">
          <label>Speed</label>
          <input type="range" id="speedSlider" min="1" max="10" value="5">
        </div>
      </div>

      <div class="panel">
        <div class="panel-label">Stats</div>
        <div class="stats">
          <div><span>Calls</span><b id="statCalls">0</b></div>
          <div><span>Depth</span><b id="statDepth">0</b></div>
          <div class="full"><span>Result</span><b id="statResult">—</b></div>
        </div>
      </div>

      <div class="panel grow">
        <div class="panel-label">Call Stack</div>
        <div id="callStackList" class="stack"></div>
      </div>
    </aside>

    <main class="canvas-area">
      <div class="canvas-label">Recursion Tree</div>
      <svg id="treeSvg" width="100%" height="100%">
        <defs>
          <filter id="rough" x="-30%" y="-30%" width="160%" height="160%">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
          <filter id="roughLine" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
          </filter>
        </defs>
        <g id="treeGroup"></g>
      </svg>
      <div id="emptyState" class="empty">
        <p>Click <strong>Run</strong> to draw the tree</p>
      </div>
    </main>
  </div>
</div>
  <script src="js/app.js"></script>
</body>
</html>
